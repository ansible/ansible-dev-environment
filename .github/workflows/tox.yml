---
name: tox

on:
  merge_group:
    branches:
      - "main"
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  tox:
    uses: ansible/team-devtools/.github/workflows/tox.yml@816fc93a05350d0443e8fab7bdd44d47bc3bfc4c # pinned due to issue with setup-uv
    with:
      max_python: "3.13"
      jobs_producing_coverage: 8
      other_names: |
        docs
        lint
        pkg
        py313-devel
        py-mise:tox -e py:mise=true
